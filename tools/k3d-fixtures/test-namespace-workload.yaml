apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-server
  namespace: telescope-test
  labels:
    app: echo-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: echo-server
  template:
    metadata:
      labels:
        app: echo-server
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo
          args: ["-text=telescope-test"]
          ports:
            - containerPort: 5678
          resources:
            requests:
              memory: "8Mi"
              cpu: "5m"
