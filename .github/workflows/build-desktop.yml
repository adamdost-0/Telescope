name: build-desktop

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'apps/desktop/**'
      - 'apps/web/src/**'
      - 'apps/web/package.json'
      - 'apps/web/svelte.config.js'
      - 'apps/web/vite.config.ts'
      - '.github/workflows/build-desktop.yml'

permissions:
  contents: read
  actions: write

jobs:
  build-windows:
    name: Build Windows Desktop (Release)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop (release bundle)
        run: pnpm -C apps/desktop bundle

      - name: List build outputs
        shell: pwsh
        run: |
          Write-Host "=== Workspace target/release ==="
          Get-ChildItem -Path target/release -Filter "telescope*" -ErrorAction SilentlyContinue | Select-Object Name, Length
          Write-Host "=== Bundle outputs ==="
          Get-ChildItem -Path target/release/bundle -Recurse -ErrorAction SilentlyContinue | Select-Object FullName, Length

      - name: Validate Windows bundle artifacts
        shell: pwsh
        run: |
          $msiFiles = Get-ChildItem -Path target/release/bundle/msi -Filter "*.msi" -ErrorAction SilentlyContinue
          $nsisFiles = Get-ChildItem -Path target/release/bundle/nsis -Filter "*.exe" -ErrorAction SilentlyContinue

          if ($msiFiles.Count -eq 0) {
            Write-Error "[fail] No MSI installer found in target/release/bundle/msi/"
            exit 1
          } else {
            Write-Host "[ok] Found MSI installer(s)"
          }

          if ($nsisFiles.Count -eq 0) {
            Write-Error "[fail] No NSIS installer found in target/release/bundle/nsis/"
            exit 1
          } else {
            Write-Host "[ok] Found NSIS installer(s)"
          }

      - name: Upload Windows portable binary
        uses: actions/upload-artifact@v4
        with:
          name: telescope-windows-portable
          path: target/release/telescope-desktop.exe
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: telescope-windows-msi
          path: target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: telescope-windows-nsis
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

  build-macos:
    name: Build macOS Desktop (Release)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable corepack
        run: corepack enable
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build desktop (release bundle)
        run: pnpm -C apps/desktop bundle
      - name: List build outputs
        run: |
          echo "=== Binary ==="
          ls -lh target/release/telescope-desktop 2>/dev/null || echo "No binary"
          echo "=== Bundle ==="
          find target/release/bundle -type f 2>/dev/null || echo "No bundle directory"

      - name: Validate macOS bundle artifacts
        run: |
          if ! ls target/release/bundle/dmg/*.dmg 1>/dev/null 2>&1; then
            echo "[fail] No DMG installer found in target/release/bundle/dmg/"
            exit 1
          else
            echo "[ok] Found DMG installer(s)"
            ls -lh target/release/bundle/dmg/*.dmg
          fi

      - name: Upload macOS portable binary
        uses: actions/upload-artifact@v4
        with:
          name: telescope-macos-portable
          path: target/release/telescope-desktop
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS DMG installer
        uses: actions/upload-artifact@v4
        with:
          name: telescope-macos-dmg
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14
