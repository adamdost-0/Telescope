name: build-desktop

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'apps/desktop/**'
      - 'apps/web/src/**'
      - 'apps/web/package.json'
      - 'apps/web/svelte.config.js'
      - 'apps/web/vite.config.ts'
      - '.github/workflows/build-desktop.yml'

permissions:
  contents: read
  actions: write

jobs:
  build-windows:
    name: Build Windows Desktop (Release)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop (release bundle)
        run: pnpm -C apps/desktop bundle

      - name: List build outputs
        shell: pwsh
        run: |
          Write-Host "=== Workspace target/release ==="
          Get-ChildItem -Path target/release -Filter "telescope*" -ErrorAction SilentlyContinue | Select-Object Name, Length
          Write-Host "=== Bundle outputs ==="
          Get-ChildItem -Path target/release/bundle -Recurse -ErrorAction SilentlyContinue | Select-Object FullName, Length

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: telescope-windows-exe
          path: target/release/telescope-desktop.exe
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows installers (if any)
        uses: actions/upload-artifact@v4
        with:
          name: telescope-windows-installers
          path: |
            target/release/bundle/msi/**
            target/release/bundle/nsis/**
          if-no-files-found: warn
          retention-days: 14
