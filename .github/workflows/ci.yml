name: ci

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cargo fmt
        run: cargo fmt --all -- --check
      - name: Cargo clippy
        # Exclude desktop crate on Linux (gtk/webkit system deps). Desktop builds in separate job.
        run: cargo clippy --workspace --exclude telescope-desktop --all-targets --all-features -- -D warnings
      - name: Cargo test
        run: cargo test --workspace --exclude telescope-desktop --all-features

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Web unit tests
        run: pnpm -C apps/web test
      - name: Web build
        run: pnpm -C apps/web build

  web-e2e:
    runs-on: ubuntu-latest
    needs: [web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm -C apps/web exec playwright install --with-deps chromium
      - name: Web E2E
        run: pnpm -C apps/web e2e

  desktop-build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Configure macOS ad-hoc signing
        if: ${{ matrix.os == 'macos-latest' }}
        run: echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
      - name: Build desktop (release bundle)
        run: pnpm -C apps/desktop bundle
      - name: Verify macOS app signature integrity
        if: ${{ matrix.os == 'macos-latest' }}
        shell: bash
        run: |
          APP_PATH=$(find target/release/bundle/macos -maxdepth 1 -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app bundle found under target/release/bundle/macos"
            exit 1
          fi
          test -f "$APP_PATH/Contents/_CodeSignature/CodeResources"
          codesign --verify --deep --strict --verbose=4 "$APP_PATH"
      - name: Verify bundle outputs
        shell: bash
        run: |
          echo "=== Binary ==="
          ls -lh target/release/telescope-desktop* 2>/dev/null || echo "No binary found"
          echo "=== Bundle ==="
          find target/release/bundle -type f 2>/dev/null || echo "No bundle directory"
