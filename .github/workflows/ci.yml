name: ci

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cargo fmt
        run: cargo fmt --all -- --check
      - name: Cargo clippy
        # Exclude desktop crate on Linux (gtk/webkit system deps). Desktop builds in separate job.
        run: cargo clippy --workspace --exclude telescope-desktop --all-targets --all-features -- -D warnings
      - name: Cargo test
        run: cargo test --workspace --exclude telescope-desktop --all-features

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Enable corepack
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm -r --if-present lint
      - name: Test
        run: pnpm -r --if-present test

  web-e2e:
    runs-on: ubuntu-latest
    needs: [web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Enable corepack
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm -C apps/web exec playwright install
      - name: E2E
        run: pnpm -C apps/web e2e

  desktop-build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Enable corepack
        run: corepack enable
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build desktop (tauri)
        run: pnpm -C apps/desktop build
