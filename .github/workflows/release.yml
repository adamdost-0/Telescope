name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            binary: telescope-desktop.exe
            asset_name: telescope-windows-x64.exe
          - os: macos-latest
            binary: telescope-desktop
            asset_name: telescope-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "RELEASE_TAG=${TAG}" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Release tag: ${TAG}, version: ${VERSION}"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Stamp release version into build configs
        shell: bash
        run: |
          # Stamp Cargo.toml crate versions
          for manifest in \
            apps/desktop/src-tauri/Cargo.toml \
            crates/core/Cargo.toml \
            crates/engine/Cargo.toml \
            crates/azure/Cargo.toml; do
            perl -pi -e 's/^version\s*=\s*"[^"]*"/version = "'"${RELEASE_VERSION}"'"/' "$manifest"
          done
          # Stamp Tauri app version (JSON) and frontend-visible version (TS)
          node <<'NODE'
          const fs = require('fs');

          const releaseVersion = process.env.RELEASE_VERSION;

          const tauriConfigPath = 'apps/desktop/src-tauri/tauri.conf.json';
          const tauriConfig = JSON.parse(fs.readFileSync(tauriConfigPath, 'utf8'));
          tauriConfig.version = releaseVersion;
          fs.writeFileSync(tauriConfigPath, JSON.stringify(tauriConfig, null, 2) + '\n');

          const webVersionPath = 'apps/web/src/lib/version.ts';
          const webVersionSource = fs.readFileSync(webVersionPath, 'utf8');
          const webVersionPattern =
            /^(\s*export\s+const\s+version\s*=\s*['"])[^'"\r\n]+(['"]\s*;?\s*)$/m;
          const nextWebVersionSource = webVersionSource.replace(
            webVersionPattern,
            (_, prefix, suffix) => `${prefix}${releaseVersion}${suffix}`,
          );

          if (!webVersionPattern.test(webVersionSource)) {
            throw new Error(`Unable to stamp ${webVersionPath}`);
          }

          fs.writeFileSync(webVersionPath, `${nextWebVersionSource.trimEnd()}\n`);
          NODE
          echo "All release version sources stamped to ${RELEASE_VERSION}"

      - name: Prepare release notes from changelog
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const changelogPath = 'CHANGELOG.md';
          const tag = process.env.RELEASE_TAG;
          const lines = fs.readFileSync(changelogPath, 'utf8').split(/\r?\n/);
          const heading = `## [${tag}]`;
          const start = lines.findIndex((line) => line.startsWith(heading));

          if (start === -1) {
            console.log(`No ${heading} section found in ${changelogPath}; falling back to autogenerated release notes.`);
            fs.appendFileSync(process.env.GITHUB_ENV, 'HAS_CHANGELOG_RELEASE_NOTES=false\n');
            process.exit(0);
          }

          let end = lines.length;
          for (let i = start + 1; i < lines.length; i += 1) {
            if (lines[i].startsWith('## [')) {
              end = i;
              break;
            }
          }

          const releaseNotes = lines.slice(start + 1, end).join('\n').trim();

          if (!releaseNotes) {
            console.log(`${heading} is empty in ${changelogPath}; falling back to autogenerated release notes.`);
            fs.appendFileSync(process.env.GITHUB_ENV, 'HAS_CHANGELOG_RELEASE_NOTES=false\n');
            process.exit(0);
          }

          const releaseNotesPath = path.join(process.env.RUNNER_TEMP, `${tag}-release-notes.md`);
          fs.writeFileSync(releaseNotesPath, `${releaseNotes}\n`);
          fs.appendFileSync(
            process.env.GITHUB_ENV,
            `HAS_CHANGELOG_RELEASE_NOTES=true\nRELEASE_NOTES_PATH=${releaseNotesPath}\n`,
          );
          console.log(`Prepared curated release notes from ${changelogPath}`);
          NODE

      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build artifacts
        run: pnpm -C apps/desktop bundle

      - name: List build outputs
        shell: bash
        run: |
          echo "=== Release ${RELEASE_TAG} ==="
          echo "--- Binary ---"
          ls -lh target/release/${{ matrix.binary }} 2>/dev/null || echo "Binary not found"
          echo "--- Bundle outputs ---"
          find target/release/bundle -type f 2>/dev/null || echo "No bundle dir"

      - name: Rename binary for release
        shell: bash
        run: |
          BASE="${{ matrix.asset_name }}"
          EXT=""
          if [[ "$BASE" == *.exe ]]; then
            EXT=".exe"
            BASE="${BASE%.exe}"
          fi
          VERSIONED="${BASE}-${RELEASE_TAG}${EXT}"
          cp "target/release/${{ matrix.binary }}" "target/release/${VERSIONED}"
          echo "VERSIONED_ASSET=${VERSIONED}" >> "$GITHUB_ENV"

      - name: Generate checksums
        shell: bash
        run: |
          cd target/release
          CHECKSUM_FILE="checksums-${{ matrix.asset_name }}.sha256"
          sha256sum "${{ env.VERSIONED_ASSET }}" > "$CHECKSUM_FILE"
          find bundle -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.app.tar.gz" \) 2>/dev/null | while read f; do
            sha256sum "$f" >> "$CHECKSUM_FILE"
          done
          echo "CHECKSUM_FILE=$CHECKSUM_FILE" >> "$GITHUB_ENV"
          echo "=== Checksums ==="
          cat "$CHECKSUM_FILE"

      - name: Create GitHub Release (curated changelog)
        if: ${{ env.HAS_CHANGELOG_RELEASE_NOTES == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          name: Telescope ${{ env.RELEASE_TAG }}
          body_path: ${{ env.RELEASE_NOTES_PATH }}
          files: |
            target/release/${{ env.VERSIONED_ASSET }}
            target/release/${{ env.CHECKSUM_FILE }}
            target/release/bundle/msi/**
            target/release/bundle/nsis/**
            target/release/bundle/dmg/**
            target/release/bundle/macos/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (autogenerated notes)
        if: ${{ env.HAS_CHANGELOG_RELEASE_NOTES != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          name: Telescope ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            target/release/${{ env.VERSIONED_ASSET }}
            target/release/${{ env.CHECKSUM_FILE }}
            target/release/bundle/msi/**
            target/release/bundle/nsis/**
            target/release/bundle/dmg/**
            target/release/bundle/macos/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
