name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            binary: telescope-desktop.exe
            asset_name: telescope-windows-x64.exe
          - os: macos-latest
            binary: telescope-desktop
            asset_name: telescope-macos-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "RELEASE_TAG=${TAG}" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Release tag: ${TAG}, version: ${VERSION}"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Stamp release version into build configs
        shell: bash
        run: |
          # Stamp Cargo.toml crate versions
          for manifest in \
            apps/desktop/src-tauri/Cargo.toml \
            apps/hub/Cargo.toml \
            crates/core/Cargo.toml \
            crates/engine/Cargo.toml \
            crates/api/Cargo.toml; do
            perl -pi -e 's/^version\s*=\s*"[^"]*"/version = "'"${RELEASE_VERSION}"'"/' "$manifest"
          done
          # Stamp Tauri app version (JSON)
          node -e "
            const fs = require('fs');
            const p = 'apps/desktop/src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            c.version = process.env.RELEASE_VERSION;
            fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');
          "
          echo "All manifests stamped to ${RELEASE_VERSION}"

      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build artifacts
        run: pnpm -C apps/desktop bundle

      - name: List build outputs
        shell: bash
        run: |
          echo "=== Release ${RELEASE_TAG} ==="
          echo "--- Binary ---"
          ls -lh target/release/${{ matrix.binary }} 2>/dev/null || echo "Binary not found"
          echo "--- Bundle outputs ---"
          find target/release/bundle -type f 2>/dev/null || echo "No bundle dir"

      - name: Rename binary for release
        shell: bash
        run: |
          BASE="${{ matrix.asset_name }}"
          EXT=""
          if [[ "$BASE" == *.exe ]]; then
            EXT=".exe"
            BASE="${BASE%.exe}"
          fi
          VERSIONED="${BASE}-${RELEASE_TAG}${EXT}"
          cp "target/release/${{ matrix.binary }}" "target/release/${VERSIONED}"
          echo "VERSIONED_ASSET=${VERSIONED}" >> "$GITHUB_ENV"

      - name: Create GitHub Release (attach artifacts)
        uses: softprops/action-gh-release@v2
        with:
          name: Telescope ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            target/release/${{ env.VERSIONED_ASSET }}
            target/release/bundle/msi/**
            target/release/bundle/nsis/**
            target/release/bundle/dmg/**
            target/release/bundle/macos/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
