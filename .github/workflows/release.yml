name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            binary: telescope-desktop.exe
            portable_asset: telescope-windows-x64-portable.exe
            bundle_patterns: |
              target/release/bundle/msi/*.msi
              target/release/bundle/nsis/*.exe
          - os: macos-latest
            platform: macos
            binary: telescope-desktop
            portable_asset: telescope-macos-arm64-portable
            bundle_patterns: |
              target/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "RELEASE_TAG=${TAG}" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Release tag: ${TAG}, version: ${VERSION}"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Configure macOS signing and notarization
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "${APPLE_CERTIFICATE}" ] && [ -n "${APPLE_CERTIFICATE_PASSWORD}" ] && [ -n "${APPLE_SIGNING_IDENTITY}" ]; then
            echo "✅ Developer ID signing secrets detected."
            {
              echo "APPLE_CERTIFICATE<<EOF"
              echo "${APPLE_CERTIFICATE}"
              echo "EOF"
              echo "APPLE_CERTIFICATE_PASSWORD=${APPLE_CERTIFICATE_PASSWORD}"
              echo "APPLE_SIGNING_IDENTITY=${APPLE_SIGNING_IDENTITY}"
              echo "MACOS_SIGNING_MODE=developer-id"
            } >> "$GITHUB_ENV"

            if [ -n "${APPLE_ID}" ] && [ -n "${APPLE_PASSWORD}" ] && [ -n "${APPLE_TEAM_ID}" ]; then
              echo "✅ Apple notarization credentials detected."
              {
                echo "APPLE_ID=${APPLE_ID}"
                echo "APPLE_PASSWORD=${APPLE_PASSWORD}"
                echo "APPLE_TEAM_ID=${APPLE_TEAM_ID}"
                echo "MACOS_NOTARIZATION_ENABLED=true"
              } >> "$GITHUB_ENV"
            else
              echo "⚠️ Apple notarization credentials missing; build will be signed but not notarized."
              echo "MACOS_NOTARIZATION_ENABLED=false" >> "$GITHUB_ENV"
            fi
          else
            echo "⚠️ Developer ID signing secrets not configured; using ad-hoc signing to avoid invalid app signatures."
            {
              echo "APPLE_SIGNING_IDENTITY=-"
              echo "MACOS_SIGNING_MODE=adhoc"
              echo "MACOS_NOTARIZATION_ENABLED=false"
            } >> "$GITHUB_ENV"
          fi

      - name: Stamp release version into build configs
        shell: bash
        run: |
          # Stamp Cargo.toml crate versions
          for manifest in \
            apps/desktop/src-tauri/Cargo.toml \
            crates/core/Cargo.toml \
            crates/engine/Cargo.toml \
            crates/azure/Cargo.toml; do
            perl -pi -e 's/^version\s*=\s*"[^"]*"/version = "'"${RELEASE_VERSION}"'"/' "$manifest"
          done
          # Stamp Tauri app version (JSON) and frontend-visible version (TS)
          node <<'NODE'
          const fs = require('fs');

          const releaseVersion = process.env.RELEASE_VERSION;

          const tauriConfigPath = 'apps/desktop/src-tauri/tauri.conf.json';
          const tauriConfig = JSON.parse(fs.readFileSync(tauriConfigPath, 'utf8'));
          tauriConfig.version = releaseVersion;
          fs.writeFileSync(tauriConfigPath, JSON.stringify(tauriConfig, null, 2) + '\n');

          const webVersionPath = 'apps/web/src/lib/version.ts';
          const webVersionSource = fs.readFileSync(webVersionPath, 'utf8');
          const webVersionPattern =
            /^(\s*export\s+const\s+version\s*=\s*['"])[^'"\r\n]+(['"]\s*;?\s*)$/m;
          const nextWebVersionSource = webVersionSource.replace(
            webVersionPattern,
            (_, prefix, suffix) => `${prefix}${releaseVersion}${suffix}`,
          );

          if (!webVersionPattern.test(webVersionSource)) {
            throw new Error(`Unable to stamp ${webVersionPath}`);
          }

          fs.writeFileSync(webVersionPath, `${nextWebVersionSource.trimEnd()}\n`);
          NODE
          echo "All release version sources stamped to ${RELEASE_VERSION}"

      - name: Prepare release notes from changelog
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const changelogPath = 'CHANGELOG.md';
          const tag = process.env.RELEASE_TAG;
          const lines = fs.readFileSync(changelogPath, 'utf8').split(/\r?\n/);
          const heading = `## [${tag}]`;
          const start = lines.findIndex((line) => line.startsWith(heading));

          if (start === -1) {
            console.log(`No ${heading} section found in ${changelogPath}; falling back to autogenerated release notes.`);
            fs.appendFileSync(process.env.GITHUB_ENV, 'HAS_CHANGELOG_RELEASE_NOTES=false\n');
            process.exit(0);
          }

          let end = lines.length;
          for (let i = start + 1; i < lines.length; i += 1) {
            if (lines[i].startsWith('## [')) {
              end = i;
              break;
            }
          }

          const releaseNotes = lines.slice(start + 1, end).join('\n').trim();

          if (!releaseNotes) {
            console.log(`${heading} is empty in ${changelogPath}; falling back to autogenerated release notes.`);
            fs.appendFileSync(process.env.GITHUB_ENV, 'HAS_CHANGELOG_RELEASE_NOTES=false\n');
            process.exit(0);
          }

          const releaseNotesPath = path.join(process.env.RUNNER_TEMP, `${tag}-release-notes.md`);
          fs.writeFileSync(releaseNotesPath, `${releaseNotes}\n`);
          fs.appendFileSync(
            process.env.GITHUB_ENV,
            `HAS_CHANGELOG_RELEASE_NOTES=true\nRELEASE_NOTES_PATH=${releaseNotesPath}\n`,
          );
          console.log(`Prepared curated release notes from ${changelogPath}`);
          NODE

      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build artifacts
        run: pnpm -C apps/desktop bundle

      - name: Verify macOS app signature integrity
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        run: |
          APP_PATH=$(find target/release/bundle/macos -maxdepth 1 -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app bundle produced under target/release/bundle/macos"
            exit 1
          fi

          echo "Checking app bundle: $APP_PATH"
          if [ ! -f "$APP_PATH/Contents/_CodeSignature/CodeResources" ]; then
            echo "❌ Missing CodeResources. App bundle is not properly signed."
            exit 1
          fi

          codesign --verify --deep --strict --verbose=4 "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH" 2>&1 | grep -E "Identifier=|Signature=|TeamIdentifier=|Authority=" || true
          spctl -a -vv "$APP_PATH" || true

      - name: List build outputs
        shell: bash
        run: |
          echo "=== Release ${RELEASE_TAG} for ${{ matrix.platform }} ==="
          echo "--- Binary ---"
          ls -lh target/release/${{ matrix.binary }} 2>/dev/null || echo "Binary not found"
          echo "--- Bundle outputs ---"
          find target/release/bundle -type f 2>/dev/null || echo "No bundle dir"

      - name: Validate required bundle artifacts
        shell: bash
        env:
          BUNDLE_PATTERNS: ${{ matrix.bundle_patterns }}
        run: |
          MISSING=""
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            if ! ls $pattern 2>/dev/null | grep -q .; then
              echo "❌ Missing required artifacts: $pattern"
              MISSING="${MISSING}${pattern}\n"
            else
              echo "✅ Found: $pattern"
              ls -lh $pattern
            fi
          done <<< "$BUNDLE_PATTERNS"
          if [ -n "$MISSING" ]; then
            echo "ERROR: Required bundle artifacts missing for ${{ matrix.platform }}"
            exit 1
          fi

      - name: Prepare portable binary
        shell: bash
        run: |
          PORTABLE="${{ matrix.portable_asset }}"
          # Strip extension if present, add version, then add extension back
          if [[ "$PORTABLE" == *.exe ]]; then
            BASE="${PORTABLE%.exe}"
            VERSIONED="${BASE}-${RELEASE_TAG}.exe"
          else
            VERSIONED="${PORTABLE}-${RELEASE_TAG}"
          fi
          cp "target/release/${{ matrix.binary }}" "target/release/${VERSIONED}"
          echo "VERSIONED_PORTABLE=${VERSIONED}" >> "$GITHUB_ENV"

      - name: Rename bundle artifacts
        shell: bash
        run: |
          cd target/release

          if [ "${{ matrix.platform }}" == "windows" ]; then
            # Rename MSI installer
            MSI_SRC=$(find bundle/msi -name "*.msi" | head -1)
            if [ -n "$MSI_SRC" ]; then
              MSI_DEST="telescope-windows-x64-${RELEASE_TAG}.msi"
              cp "$MSI_SRC" "$MSI_DEST"
              echo "MSI_ARTIFACT=$MSI_DEST" >> "$GITHUB_ENV"
              echo "✅ Renamed MSI: $MSI_DEST"
            fi

            # Rename NSIS installer
            NSIS_SRC=$(find bundle/nsis -name "*.exe" | head -1)
            if [ -n "$NSIS_SRC" ]; then
              NSIS_DEST="telescope-windows-x64-setup-${RELEASE_TAG}.exe"
              cp "$NSIS_SRC" "$NSIS_DEST"
              echo "NSIS_ARTIFACT=$NSIS_DEST" >> "$GITHUB_ENV"
              echo "✅ Renamed NSIS: $NSIS_DEST"
            fi
          elif [ "${{ matrix.platform }}" == "macos" ]; then
            # Rename DMG installer
            DMG_SRC=$(find bundle/dmg -name "*.dmg" | head -1)
            if [ -n "$DMG_SRC" ]; then
              DMG_DEST="telescope-macos-arm64-${RELEASE_TAG}.dmg"
              cp "$DMG_SRC" "$DMG_DEST"
              echo "DMG_ARTIFACT=$DMG_DEST" >> "$GITHUB_ENV"
              echo "✅ Renamed DMG: $DMG_DEST"
            fi
          fi

      - name: Verify signed app inside DMG
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        run: |
          DMG_PATH="target/release/${{ env.DMG_ARTIFACT }}"
          if [ ! -f "$DMG_PATH" ]; then
            echo "❌ DMG artifact not found: $DMG_PATH"
            exit 1
          fi

          MOUNT_DIR=$(hdiutil attach "$DMG_PATH" -nobrowse -readonly | tail -n1 | awk '{print $3}')
          APP_PATH=$(find "$MOUNT_DIR" -maxdepth 2 -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found inside mounted DMG"
            hdiutil detach "$MOUNT_DIR" || true
            exit 1
          fi

          echo "Checking DMG app bundle: $APP_PATH"
          codesign --verify --deep --strict --verbose=4 "$APP_PATH"

          if [ "${MACOS_NOTARIZATION_ENABLED}" = "true" ]; then
            echo "Notarization expected; validating with spctl and stapler."
            spctl -a -vv "$APP_PATH"
            xcrun stapler validate "$DMG_PATH"
          else
            spctl -a -vv "$APP_PATH" || true
          fi

          hdiutil detach "$MOUNT_DIR"

      - name: Generate checksums
        shell: bash
        run: |
          cd target/release
          CHECKSUM_FILE="telescope-${{ matrix.platform }}-${RELEASE_TAG}.sha256"

          # Portable binary checksum
          sha256sum "${{ env.VERSIONED_PORTABLE }}" > "$CHECKSUM_FILE"

          # Renamed bundle artifact checksums
          if [ "${{ matrix.platform }}" == "windows" ]; then
            [ -n "${{ env.MSI_ARTIFACT }}" ] && sha256sum "${{ env.MSI_ARTIFACT }}" >> "$CHECKSUM_FILE"
            [ -n "${{ env.NSIS_ARTIFACT }}" ] && sha256sum "${{ env.NSIS_ARTIFACT }}" >> "$CHECKSUM_FILE"
          elif [ "${{ matrix.platform }}" == "macos" ]; then
            [ -n "${{ env.DMG_ARTIFACT }}" ] && sha256sum "${{ env.DMG_ARTIFACT }}" >> "$CHECKSUM_FILE"
          fi

          echo "CHECKSUM_FILE=$CHECKSUM_FILE" >> "$GITHUB_ENV"
          echo "=== Checksums for ${{ matrix.platform }} ==="
          cat "$CHECKSUM_FILE"

      - name: Create GitHub Release (curated changelog, Windows)
        if: ${{ env.HAS_CHANGELOG_RELEASE_NOTES == 'true' && matrix.platform == 'windows' }}
        uses: softprops/action-gh-release@v2
        with:
          name: Telescope ${{ env.RELEASE_TAG }}
          body_path: ${{ env.RELEASE_NOTES_PATH }}
          files: |
            target/release/${{ env.VERSIONED_PORTABLE }}
            target/release/${{ env.CHECKSUM_FILE }}
            target/release/${{ env.MSI_ARTIFACT }}
            target/release/${{ env.NSIS_ARTIFACT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (curated changelog, macOS)
        if: ${{ env.HAS_CHANGELOG_RELEASE_NOTES == 'true' && matrix.platform == 'macos' }}
        uses: softprops/action-gh-release@v2
        with:
          name: Telescope ${{ env.RELEASE_TAG }}
          body_path: ${{ env.RELEASE_NOTES_PATH }}
          files: |
            target/release/${{ env.VERSIONED_PORTABLE }}
            target/release/${{ env.CHECKSUM_FILE }}
            target/release/${{ env.DMG_ARTIFACT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (autogenerated notes, Windows)
        if: ${{ env.HAS_CHANGELOG_RELEASE_NOTES != 'true' && matrix.platform == 'windows' }}
        uses: softprops/action-gh-release@v2
        with:
          name: Telescope ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            target/release/${{ env.VERSIONED_PORTABLE }}
            target/release/${{ env.CHECKSUM_FILE }}
            target/release/${{ env.MSI_ARTIFACT }}
            target/release/${{ env.NSIS_ARTIFACT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (autogenerated notes, macOS)
        if: ${{ env.HAS_CHANGELOG_RELEASE_NOTES != 'true' && matrix.platform == 'macos' }}
        uses: softprops/action-gh-release@v2
        with:
          name: Telescope ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            target/release/${{ env.VERSIONED_PORTABLE }}
            target/release/${{ env.CHECKSUM_FILE }}
            target/release/${{ env.DMG_ARTIFACT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
